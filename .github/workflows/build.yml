name: Build

permissions:
    contents: write

on:
    push:
        branches: [main]

jobs:
    build:
        name: Build ${{ matrix.config.name }}
        runs-on: ${{ matrix.config.os }}
        strategy:
            matrix:
                config:
                    - { name: MacOS-x64,    os: macos-latest,   target: "node18-macos-x64",     out: "Launcher-MACOS-x64" }
                    - { name: MacOS-arm64,  os: macos-latest,   target: "node18-macos-arm64",   out: "Launcher-MACOS-arm64" }
                    # - { name: Windows-x86, os: windows-latest, target: "node18-win-x64", out: "Launcher-WINDOWS-x64" }
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v3
              with:
                node-version: 18

            - run: npm install
            - run: npm install pkg

            - name: Build Launcher (MacOS)
              if: runner.os == 'macOS'
              shell: bash
              run: |
                npx pkg . --targets ${{ matrix.config.target }} --output ${{ matrix.config.out }}
            
            - uses: actions/upload-artifact@v4
              with:
                name: Launcher-Artifact-${{ matrix.config.name }}
                path: dist/
            
            - name: Commit Launcher (MacOS)
              if: runner.os == 'macOS'
              run: |
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

                git add dist/${{ matrix.config.out }}
                git commit -m "Update Launcher (${{ matrix.config.out }})" || echo "No changes; not commiting build."
                git push
